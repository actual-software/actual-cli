rules:
  # ==========================================================================
  # Internal Structuring Patterns (leaf_id: 24)
  # ==========================================================================

  - id: csharp.layered.architecture
    languages: [csharp]
    message: Layered architecture pattern detected
    severity: INFO
    metadata:
      facet_slot: structure.layering
      leaf_id: "24"
      confidence: "0.7"
    patterns:
      - pattern-regex: "namespace\\s+[A-Za-z0-9_.]+\\.(Controllers|Services|Repositories|Infrastructure)"

  - id: csharp.shared.kernel
    languages: [csharp]
    message: Shared kernel or shared code policy detected
    severity: INFO
    metadata:
      facet_slot: structure.shared_code_policy
      leaf_id: "24"
      confidence: "0.7"
    patterns:
      - pattern-regex: "namespace\\s+[A-Za-z0-9_.]+\\.(Shared|SharedKernel|Common)"
