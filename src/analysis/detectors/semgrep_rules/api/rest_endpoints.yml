rules:
  # ==========================================================================
  # Express (JavaScript/TypeScript)
  # ==========================================================================

  - id: js.express.route
    languages: [javascript, typescript]
    message: Express route handler detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.9"
      category: service_boundary
    patterns:
      - pattern-either:
          - pattern: $APP.get($PATH, ...)
          - pattern: $APP.post($PATH, ...)
          - pattern: $APP.put($PATH, ...)
          - pattern: $APP.delete($PATH, ...)
          - pattern: $APP.patch($PATH, ...)

  - id: js.fastify.route
    languages: [javascript, typescript]
    message: Fastify route handler detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.9"
    patterns:
      - pattern-either:
          - pattern: $FASTIFY.get($PATH, ...)
          - pattern: $FASTIFY.post($PATH, ...)
          - pattern: "$FASTIFY.route({ method: $METHOD, ... })"

  # ==========================================================================
  # NestJS (TypeScript)
  # ==========================================================================

  - id: ts.nestjs.controller.method
    languages: [typescript]
    message: NestJS controller method detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: |
              @Get($PATH)
              $METHOD(...) { ... }
          - pattern: |
              @Post($PATH)
              $METHOD(...) { ... }
          - pattern: |
              @Put($PATH)
              $METHOD(...) { ... }
          - pattern: |
              @Delete($PATH)
              $METHOD(...) { ... }
          - pattern: |
              @Patch($PATH)
              $METHOD(...) { ... }

  - id: ts.nestjs.controller
    languages: [typescript]
    message: NestJS controller detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.95"
    patterns:
      - pattern: |
          @Controller($PATH)
          class $CLASS { ... }

  # ==========================================================================
  # FastAPI (Python)
  # ==========================================================================

  - id: py.fastapi.route
    languages: [python]
    message: FastAPI route handler detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: |
              @$APP.get($PATH)
              def $FUNC(...): ...
          - pattern: |
              @$APP.post($PATH)
              def $FUNC(...): ...
          - pattern: |
              @$APP.put($PATH)
              def $FUNC(...): ...
          - pattern: |
              @$APP.delete($PATH)
              def $FUNC(...): ...
          - pattern: |
              @$ROUTER.get($PATH)
              async def $FUNC(...): ...
          - pattern: |
              @$ROUTER.post($PATH)
              async def $FUNC(...): ...

  # ==========================================================================
  # Flask (Python)
  # ==========================================================================

  - id: py.flask.route
    languages: [python]
    message: Flask route handler detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.9"
    patterns:
      - pattern: |
          @$APP.route($PATH, ...)
          def $FUNC(...): ...

  # ==========================================================================
  # Django (Python)
  # ==========================================================================

  - id: py.django.view
    languages: [python]
    message: Django view detected
    severity: INFO
    metadata:
      facet_slot: boundaries.service_definitions
      leaf_id: "23"
      confidence: "0.85"
    patterns:
      - pattern-either:
          - pattern: |
              class $VIEW(View):
                  ...
          - pattern: |
              class $VIEW(APIView):
                  ...

