rules:
  # ==========================================================================
  # Secrets & Credentials (leaf_id: 43)
  # ==========================================================================

  - id: csharp.secrets.getenv
    languages: [csharp]
    message: Environment variable secret usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_handling
      leaf_id: "43"
      confidence: "0.7"
    patterns:
      - pattern: Environment.GetEnvironmentVariable($NAME)

  - id: php.secrets.getenv
    languages: [php]
    message: Environment variable secret usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_handling
      leaf_id: "43"
      confidence: "0.7"
    patterns:
      - pattern-either:
          - pattern: getenv($NAME)
          - pattern: $_ENV[$NAME]
          - pattern: $_SERVER[$NAME]
