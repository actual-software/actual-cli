rules:
  # ==========================================================================
  # Environment Variables
  # ==========================================================================

  - id: js.env.secrets
    languages: [javascript, typescript]
    message: Environment variable secret access detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.8"
    patterns:
      - pattern-either:
          - pattern: process.env.$SECRET
          - pattern: process.env["$SECRET"]

  - id: py.env.secrets
    languages: [python]
    message: Environment variable secret access detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.8"
    patterns:
      - pattern-either:
          - pattern: os.environ[$SECRET]
          - pattern: os.environ.get($SECRET)
          - pattern: os.getenv($SECRET)

  - id: go.env.secrets
    languages: [go]
    message: Environment variable access detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.8"
    patterns:
      - pattern-either:
          - pattern: os.Getenv($KEY)
          - pattern: os.LookupEnv($KEY)

  - id: rust.env.secrets
    languages: [rust]
    message: Environment variable access detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.8"
    patterns:
      - pattern-either:
          - pattern: std::env::var($KEY)
          - pattern: env::var($KEY)

  # ==========================================================================
  # HashiCorp Vault
  # ==========================================================================

  - id: js.vault.client
    languages: [javascript, typescript]
    message: HashiCorp Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: vault.read($PATH)
          - pattern: new Vault(...)

  - id: py.vault.client
    languages: [python]
    message: HashiCorp Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: hvac.Client(...)
          - pattern: $CLIENT.secrets.kv.read_secret_version(...)

  - id: go.vault.client
    languages: [go]
    message: HashiCorp Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: vault.NewClient(...)
          - pattern: $CLIENT.Logical().Read(...)

  # ==========================================================================
  # AWS Secrets Manager
  # ==========================================================================

  - id: js.aws.secrets
    languages: [javascript, typescript]
    message: AWS Secrets Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: new SecretsManagerClient(...)
          - pattern: GetSecretValueCommand(...)
          - pattern: secretsManager.getSecretValue(...)

  - id: py.aws.secrets
    languages: [python]
    message: AWS Secrets Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: boto3.client("secretsmanager")
          - pattern: $CLIENT.get_secret_value(...)

  - id: go.aws.secrets
    languages: [go]
    message: AWS Secrets Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: secretsmanager.New(...)
          - pattern: $CLIENT.GetSecretValue(...)

  # ==========================================================================
  # Azure Key Vault
  # ==========================================================================

  - id: js.azure.keyvault
    languages: [javascript, typescript]
    message: Azure Key Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: new SecretClient(...)
          - pattern: $CLIENT.getSecret($NAME)

  - id: py.azure.keyvault
    languages: [python]
    message: Azure Key Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: SecretClient(...)
          - pattern: $CLIENT.get_secret($NAME)

  - id: csharp.azure.keyvault
    languages: [csharp]
    message: Azure Key Vault client detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: new SecretClient(...)
          - pattern: $CLIENT.GetSecret($NAME)

  # ==========================================================================
  # GCP Secret Manager
  # ==========================================================================

  - id: js.gcp.secrets
    languages: [javascript, typescript]
    message: GCP Secret Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: new SecretManagerServiceClient(...)
          - pattern: $CLIENT.accessSecretVersion(...)

  - id: py.gcp.secrets
    languages: [python]
    message: GCP Secret Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: secretmanager.SecretManagerServiceClient(...)
          - pattern: $CLIENT.access_secret_version(...)

  - id: go.gcp.secrets
    languages: [go]
    message: GCP Secret Manager usage detected
    severity: INFO
    metadata:
      facet_slot: security.secrets_management
      leaf_id: "38"
      confidence: "0.95"
    patterns:
      - pattern-either:
          - pattern: secretmanager.NewClient(...)
          - pattern: $CLIENT.AccessSecretVersion(...)
