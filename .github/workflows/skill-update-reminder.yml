name: Skill Update Reminder

on:
  pull_request:
    branches: [main]
    paths:
      - src/error.rs
      - src/config/types.rs
      - src/config/dotpath.rs
      - src/config/paths.rs
      - src/generation/format.rs
      - src/generation/markers.rs
      - src/generation/merge.rs
      - src/cli/args.rs
      - src/runner/**
      - src/cli/commands/sync.rs
      - src/cli/commands/sync_wiring.rs

permissions: {}

jobs:
  remind:
    name: Skill Update Reminder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Identify changed skill-relevant files
        id: changes
        run: |
          changed=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -E \
            '^(src/error\.rs|src/config/(types|dotpath|paths)\.rs|src/generation/(format|markers|merge)\.rs|src/cli/args\.rs|src/runner/|src/cli/commands/sync(_wiring)?\.rs)' \
            || true)
          if [ -n "$changed" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              echo "$changed"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing reminder comment
        if: steps.changes.outputs.found == 'true'
        id: existing
        run: |
          marker="<!-- skill-update-reminder -->"
          existing=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq "[.[] | select(.body | contains(\"$marker\"))] | length")
          echo "has_comment=$( [ "$existing" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post reminder comment
        if: steps.changes.outputs.found == 'true' && steps.existing.outputs.has_comment != 'true'
        run: |
          cat <<'COMMENT' | gh pr comment ${{ github.event.pull_request.number }} --body-file -
          <!-- skill-update-reminder -->
          ### actual skill repos may need updating

          This PR modifies files that are referenced by the `actual` companion skill. The skill is now maintained in standalone repos. If the changes affect user-facing behavior (new errors, config keys, flags, output format changes, runner changes), the corresponding skill reference files should be updated in the standalone repos.

          **Changed files:**
          ${{ steps.changes.outputs.files }}

          **Skill repos to update:**
          - Standard variant: [actual-software/actual-skill](https://github.com/actual-software/actual-skill)
          - OpenClaw variant: [actual-software/actual-skill-openclaw](https://github.com/actual-software/actual-skill-openclaw)

          **Mapping:**
          | Changed Area | Skill Reference File |
          |-------------|---------------------|
          | `src/error.rs` | `references/error-catalog.md` |
          | `src/config/` | `references/config-reference.md` |
          | `src/generation/format.rs` | `references/output-formats.md` |
          | `src/generation/markers.rs`, `merge.rs` | `references/output-formats.md` |
          | `src/cli/args.rs`, `src/runner/` | `references/runner-guide.md` |
          | `src/cli/commands/sync*.rs` | `references/sync-workflow.md` |

          If the changes are purely internal (refactoring, tests, perf) with no user-facing impact, this reminder can be ignored.
          COMMENT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
