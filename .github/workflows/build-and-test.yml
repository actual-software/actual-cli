name: Build and Test

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

env:
  CARGO_INCREMENTAL: 0

jobs:
  # === Beads Sync (shared, runs once) ===
  sync-beads:
    name: Sync Beads
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: sync
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # === Build (release binaries for x86_64 + aarch64) ===
  build:
    name: Build
    needs: sync-beads
    if: always() && needs.sync-beads.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: actual-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/actual

  # === Build fix-bead jobs ===
  create-build-fix-bead:
    name: Create Build Fix Bead
    if: always() && needs.build.result == 'failure' && github.event_name == 'pull_request'
    needs: [sync-beads, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: create
          failure-type: build_error
          failure-summary: "Build failed - check CI logs"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-build-fix-beads:
    name: Cleanup Build Fix Beads
    if: always() && needs.build.result == 'success' && github.event_name == 'pull_request'
    needs: [sync-beads, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: cleanup
          failure-type: build_error
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # === Test (debug mode, unit + integration tests) ===
  test:
    name: Test
    needs: sync-beads
    if: always() && needs.sync-beads.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: |
          cargo test --workspace --features integration 2>&1 | tee test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "test_exit=$TEST_EXIT" >> $GITHUB_ENV
          exit $TEST_EXIT

      - name: Create test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ env.test_exit }}" = "0" ]; then
            PASSED=$(grep -c "^test .* ok$" test-output.txt 2>/dev/null || echo "0")
            echo ":white_check_mark: **All $PASSED tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **Tests failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(test .* FAILED|failures:)" test-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "See full output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: test-output
          path: test-output.txt

      - name: Upload tui-test captures
        if: always()
        uses: ./.github/actions/tui-test-report

  # === Test fix-bead jobs ===
  create-test-fix-bead:
    name: Create Test Fix Bead
    if: always() && needs.test.result == 'failure' && github.event_name == 'pull_request'
    needs: [sync-beads, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Download test output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: test-output
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: create
          failure-type: test_failure
          failure-summary: "Tests failed - see artifacts for details"
          failure-details-file: test-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-test-fix-beads:
    name: Cleanup Test Fix Beads
    if: always() && needs.test.result == 'success' && github.event_name == 'pull_request'
    needs: [sync-beads, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: cleanup
          failure-type: test_failure
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # === Live E2E (uses pre-built binary from build job) ===
  live-e2e:
    name: Live E2E
    needs: [sync-beads, test, build]
    if: >-
      always()
      && github.event_name == 'merge_group'
      && needs.sync-beads.result != 'cancelled'
      && needs.test.result == 'success'
      && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download actual binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: actual-x86_64-unknown-linux-gnu
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/actual

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude auth
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude auth status --json | grep -q '"loggedIn": *true'

      - name: Run E2E
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ACTUAL_E2E_API_URL: https://api-service.api.staging.actual.ai
        shell: bash
        run: |
          bash scripts/e2e.sh ./bin/actual 2>&1 | tee e2e-output.txt
          E2E_EXIT=${PIPESTATUS[0]}
          exit $E2E_EXIT

      - name: Create test summary
        if: always()
        run: |
          echo "## Live E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            PASSED=$(grep -c '\[PASS\]' e2e-output.txt 2>/dev/null || echo "0")
            echo ":white_check_mark: **All $PASSED E2E checks passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: **E2E failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep '\[FAIL\]' e2e-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "See full output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload E2E output
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: e2e-output
          path: e2e-output.txt
          if-no-files-found: ignore

  # === Live E2E fix-bead jobs ===
  create-live-e2e-fix-bead:
    name: Create Live E2E Fix Bead
    if: always() && needs.live-e2e.result == 'failure' && github.event_name == 'pull_request'
    needs: [sync-beads, build, test, live-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Download E2E output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: e2e-output
        continue-on-error: true
      - name: Prepare failure details
        run: |
          if [[ ! -f e2e-output.txt ]]; then
            echo "E2E output not available (job may have failed before producing output)" > e2e-output.txt
          fi
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: create
          failure-type: live_e2e_failure
          failure-summary: "Live E2E failed - see artifacts for details"
          failure-details-file: e2e-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-live-e2e-fix-beads:
    name: Cleanup Live E2E Fix Beads
    if: always() && needs.live-e2e.result == 'success' && github.event_name == 'pull_request'
    needs: [sync-beads, build, test, live-e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: cleanup
          failure-type: live_e2e_failure
          github-token: ${{ secrets.GITHUB_TOKEN }}
