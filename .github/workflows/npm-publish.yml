name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Skip beta/alpha/rc tags — only publish stable releases
  check-stable:
    name: Check Stable Release
    runs-on: ubuntu-latest
    outputs:
      is-stable: ${{ steps.check.outputs.is-stable }}
    steps:
      - name: Check if stable tag
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '-(alpha|beta|rc|test)[.0-9]*$'; then
            echo "is-stable=false" >> "$GITHUB_OUTPUT"
            echo "Skipping npm publish for pre-release tag: $TAG"
          else
            echo "is-stable=true" >> "$GITHUB_OUTPUT"
            echo "Stable release: $TAG"
          fi

  # macOS ARM64 — build, sign, notarize
  build-macos-arm64:
    name: Build (macOS arm64)
    needs: check-stable
    if: needs.check-stable.outputs.is-stable == 'true'
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-cargo-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-aarch64-apple-darwin-

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign binary
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --deep --force --verify --verbose \
            --sign "$DEVELOPER_ID" \
            --options runtime \
            target/aarch64-apple-darwin/release/actual

          codesign --verify --verbose target/aarch64-apple-darwin/release/actual

      - name: Notarize
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            target/aarch64-apple-darwin/release/actual \
            "$RUNNER_TEMP/actual.zip"

          xcrun notarytool submit "$RUNNER_TEMP/actual.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: actual-darwin-arm64
          path: target/aarch64-apple-darwin/release/actual

  # macOS x86_64 — build, sign, notarize
  build-macos-x64:
    name: Build (macOS x64)
    needs: check-stable
    if: needs.check-stable.outputs.is-stable == 'true'
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-cargo-x86_64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-x86_64-apple-darwin-

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign binary
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign --deep --force --verify --verbose \
            --sign "$DEVELOPER_ID" \
            --options runtime \
            target/x86_64-apple-darwin/release/actual

          codesign --verify --verbose target/x86_64-apple-darwin/release/actual

      - name: Notarize
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          ditto -c -k --keepParent \
            target/x86_64-apple-darwin/release/actual \
            "$RUNNER_TEMP/actual.zip"

          xcrun notarytool submit "$RUNNER_TEMP/actual.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: actual-darwin-x64
          path: target/x86_64-apple-darwin/release/actual

  # Linux x86_64
  build-linux-x64:
    name: Build (Linux x64)
    needs: check-stable
    if: needs.check-stable.outputs.is-stable == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-x86_64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-x86_64-unknown-linux-gnu-

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: actual-linux-x64
          path: target/x86_64-unknown-linux-gnu/release/actual

  # Linux ARM64 (cross-compile)
  build-linux-arm64:
    name: Build (Linux arm64)
    needs: check-stable
    if: needs.check-stable.outputs.is-stable == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-aarch64-unknown-linux-gnu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-aarch64-unknown-linux-gnu-

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: actual-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/actual

  # Publish all npm packages
  publish-npm:
    name: Publish to npm
    needs:
      - check-stable
      - build-macos-arm64
      - build-macos-x64
      - build-linux-x64
      - build-linux-arm64
    if: needs.check-stable.outputs.is-stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout npm scaffolding
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: actual-software/actual-releases
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts/

      - name: Sync npm versions from tag
        run: |
          VERSION="${{ github.ref_name }}"
          bash scripts/sync-npm-version.sh "${VERSION#v}"

      - name: Place binaries into platform packages
        run: |
          cp artifacts/actual-darwin-arm64/actual npm/actual-darwin-arm64/bin/actual
          chmod +x npm/actual-darwin-arm64/bin/actual

          cp artifacts/actual-darwin-x64/actual npm/actual-darwin-x64/bin/actual
          chmod +x npm/actual-darwin-x64/bin/actual

          cp artifacts/actual-linux-x64/actual npm/actual-linux-x64/bin/actual
          chmod +x npm/actual-linux-x64/bin/actual

          cp artifacts/actual-linux-arm64/actual npm/actual-linux-arm64/bin/actual
          chmod +x npm/actual-linux-arm64/bin/actual

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in actual-darwin-arm64 actual-darwin-x64 actual-linux-x64 actual-linux-arm64; do
            echo "Publishing @actualai/$pkg..."
            (cd npm/$pkg && npm publish --access public)
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing @actualai/actual..."
          cd npm/actual && npm publish --access public
