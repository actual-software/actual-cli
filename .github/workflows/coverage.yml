name: Coverage

# BULLETPROOF COVERAGE ENFORCEMENT
# This workflow ensures 100% test coverage using per-module measurement.
# It runs on:
#   1. PRs (before merge) - prevents uncovered code from entering
#   2. Merge queue (during merge) - double-checks the merged result
# Uses cargo-llvm-cov for precise source-based coverage measurement.

on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

jobs:
  sync-beads:
    name: Sync Beads
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: sync
          github-token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Coverage Enforcement
    needs: sync-beads
    if: always() && needs.sync-beads.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@934c8243ef762518efe4cd4a73c56c5d3a6ac1e8  # cargo-llvm-cov

      - name: Run coverage
        run: |
          # Exclude main.rs (thin binary wrapper with process::exit),
          # real_terminal.rs (console::Term I/O wrapper with untestable OS
          # error paths), sync_kb_poller.rs (crossterm TTY poller, only runs
          # on real TTY), tui-test crate PTY files (pty.rs, session.rs —
          # OS-level pseudo-terminal management with untestable TTY error
          # paths), and test files from coverage measurement.
          cargo llvm-cov --workspace --ignore-filename-regex '(src/main\.rs|tests/|real_terminal\.rs|sync_kb_poller\.rs|tui/renderer\.rs|pty\.rs|session\.rs)' --lcov --output-path lcov.info 2>&1 | tee coverage-output.txt
          COV_EXIT=${PIPESTATUS[0]}
          echo "cov_exit=$COV_EXIT" >> $GITHUB_ENV

      - name: Generate text report
        if: always()
        run: |
          cargo llvm-cov report --ignore-filename-regex '(src/main\.rs|tests/|real_terminal\.rs|sync_kb_poller\.rs|tui/renderer\.rs|pty\.rs|session\.rs)' 2>&1 | tee coverage-summary.txt || true

      - name: Enforce 100% coverage
        if: always()
        run: |
          echo "==> Enforcing 100% per-file line coverage (LCOV)..."
          echo ""

          if [ ! -f lcov.info ]; then
            echo "ERROR: lcov.info not found"
            exit 1
          fi

          # Use LCOV data for per-file line coverage enforcement.
          # LCOV correctly counts a line as covered when ANY execution
          # region on that line is hit. This avoids false negatives from
          # `llvm-cov report` which can report phantom missed lines from
          # ? operator and matches! macro region expansions even when the
          # source line itself was executed.
          python3 -c "
          import sys

          def parse_lcov(path):
              files = {}
              current_file = None
              for line in open(path):
                  line = line.strip()
                  if line.startswith('SF:'):
                      current_file = line[3:]
                      files[current_file] = {'hit': 0, 'total': 0}
                  elif line.startswith('DA:') and current_file:
                      parts = line[3:].split(',')
                      count = int(parts[1])
                      files[current_file]['total'] += 1
                      if count > 0:
                          files[current_file]['hit'] += 1
                  elif line == 'end_of_record':
                      current_file = None
              return files

          files = parse_lcov('lcov.info')
          failed = False

          for filepath in sorted(files):
              data = files[filepath]
              total = data['total']
              hit = data['hit']
              pct = 100.0 if total == 0 else (hit / total) * 100.0

              rel = filepath
              src_idx = filepath.find('/src/')
              if src_idx >= 0:
                  rel = filepath[src_idx + 5:]

              if pct < 100.0:
                  print(f'  X FAIL: {rel} has {pct:.2f}% coverage ({hit}/{total} lines)')
                  failed = True
              else:
                  print(f'  OK {rel}: {pct:.2f}%')

          print()
          if failed:
              print('X FAIL: Some files have < 100% line coverage')
              print('Every source file must have 100% test coverage.')
              sys.exit(1)
          else:
              print('OK SUCCESS: All files have 100% line coverage!')
          "

      - name: Create coverage summary
        if: always()
        run: |
          echo "## Coverage Enforcement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Enforcement Strategy:** Per-file 100% coverage via cargo-llvm-cov" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage-summary.txt ]; then
            TOTAL_COVERAGE=$(grep "^TOTAL" coverage-summary.txt | grep -oE '[0-9]+\.[0-9]+%' | tail -1 || echo "N/A")
            echo "**Total Coverage:** $TOTAL_COVERAGE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '<details>' >> $GITHUB_STEP_SUMMARY
            echo '<summary>Per-file Coverage Report</summary>' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate HTML report
        if: always()
        run: |
          cargo llvm-cov report --ignore-filename-regex '(src/main\.rs|tests/|real_terminal\.rs|sync_kb_poller\.rs|tui/renderer\.rs|pty\.rs|session\.rs)' --html --output-dir coverage-html 2>/dev/null || true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report
          path: |
            lcov.info
            coverage-summary.txt
            coverage-html/

  create-fix-bead:
    name: Create Fix Bead
    if: always() && needs.coverage.result == 'failure' && github.event_name == 'pull_request'
    needs: [sync-beads, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: coverage-report

      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: create
          failure-type: coverage_gap
          failure-summary: "Coverage below 100%"
          failure-details-file: coverage-summary.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-fix-beads:
    name: Cleanup Fix Beads
    if: always() && needs.coverage.result == 'success' && github.event_name == 'pull_request'
    needs: [sync-beads, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: poiley/bdgha@4a67819785a8d45505d56e2ff408df60ddbfd0f6  # v2
        with:
          mode: cleanup
          failure-type: coverage_gap
          github-token: ${{ secrets.GITHUB_TOKEN }}
