services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    ports:
      - "7070:7070"
    volumes:
      - ./WORKFLOW.distributed.md:/app/WORKFLOW.md:ro
      - ~/.ssh:/root/.ssh:ro
      - symphony-data:/data
    env_file: .env.local
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    deploy:
      replicas: 5
    env_file: .env.local
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:7070
      - REPO_URL=https://github.com/actual-software/actual-cli.git
      - BASE_CLONE_PATH=/tmp/worker-base
      - WORKTREE_ROOT=/tmp/worker-worktrees
      - RUST_LOG=info
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: on-failure

volumes:
  symphony-data:
